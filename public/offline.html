<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CodixIA — Offline</title>
  <style>
    :root {
      --bg: #020617;
      --text: #e2e8f0;
      --muted: #64748b;
      --accent: #0d7bea;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 2rem;
    }
    .card {
      text-align: center;
      max-width: 320px;
    }
    svg { width: 80px; height: 80px; margin-bottom: 1.5rem; }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
    p { color: var(--muted); font-size: 0.875rem; line-height: 1.5; margin-bottom: 1.5rem; }
    button {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 0.625rem 1.5rem;
      border-radius: 0.5rem;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.9; }
    button:active { opacity: 0.8; }
  </style>
</head>
<body>
  <div class="card">
    <svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
      <rect width="500" height="500" fill="#0D7BEA" rx="80"/>
      <circle cx="250" cy="180" r="50" fill="#fff" opacity="0.4"/>
      <path d="M100 160 Q250 260 400 160" stroke="#fff" stroke-width="8" fill="none" stroke-dasharray="8 8" opacity="0.5"/>
    </svg>
    <h1>You're offline</h1>
    <p>Check your internet connection and try again. Your data will sync automatically once you're back online.</p>
    <button onclick="location.reload()">Retry</button>
  </div>
</body>
</html>
